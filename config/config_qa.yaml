subinfo_fields:
  - name: subject_id
    type: int
    constraints:
      min: 101
      max: 999
      digits: 3

subinfo_mapping:
  subject_id: 受试编号（3位）
  Participant Information: 参与者信息
  registration_failed: 注册失败
  registration_successful: 注册成功
  invalid_input: '{field} 输入无效'

window:
  size: [1280, 720]
  units: pix
  screen: 0
  bg_color: black
  fullscreen: false
  monitor_width_cm: 35.5
  monitor_distance_cm: 60

task:
  task_name: temporal_bisection_task
  save_path: ./outputs/qa
  language: Chinese
  voice_name: zh-CN-YunyangNeural
  voice_enabled: false
  seed_mode: same_across_sub
  overall_seed: 42043
  block_seed:
    - 42043
    - 42044
  phase_order:
    - instruction
    - learning_fixation
    - learning_stimulus
    - learning_label
    - learning_iti
    - test_fixation
    - test_stimulus
    - test_response
    - test_iti
    - good_bye
  total_blocks: 2
  total_trials: 16
  trial_per_block: 8
  conditions:
    - learning
    - test
  condition_weights:
    learning: 1
    test: 1
  key_list:
    - space
    - left
    - right
  response_key: left
  response_key_short: left
  response_key_long: right
  start_key: space
  practice_trials: 4
  test_trials: 12
  anchor_short_ms: 400
  anchor_long_ms: 1600
  probe_durations_ms:
    - 400
    - 500
    - 650
    - 800
    - 950
    - 1100
    - 1300
    - 1600
  delta: 0.0
  instruction_font: SimHei
  body_font: SimHei
  prompt_font: SimHei
  font_size_large: 34
  font_size_medium: 28
  font_size_small: 24
  flash_size_px: [120, 120]
  response_box_width_px: 220
  response_box_height_px: 120
  short_box_x: -260
  long_box_x: 260
  prompt_y: 190
  response_box_y: -20
  short_hint_y: -150
  long_hint_y: -150
  fixation_y: 0
  flash_y: 0
  response_timeout_s: 3.0
  fixation_duration_s: 0.5
  learning_label_duration_s: 0.6
  iti_duration_s: 0.4

timing:
  fixation_duration_s: 0.5
  learning_label_duration_s: 0.6
  iti_duration_s: 0.4
  response_timeout_s: 3.0

stimuli:
  instruction_text:
    type: text
    font: SimHei
    text: |-
      你将完成一个时间二分任务。
      请先记住两个标准：
      短标准 {short_ms}
      长标准 {long_ms}

      每次中央出现白色方块后，
      请判断它更接近“短”还是“长”。
      先看标准试次，再做正式判断。
      正式判断时，左箭头 = 短，右箭头 = 长。

      按空格开始。
    color: white
    height: 28
    wrapWidth: 1040
    pos: [0, 0]
  learning_label_text:
    type: text
    font: SimHei
    text: |-
      这是{anchor_label}
      {anchor_ms_text}
    color: white
    height: 30
    wrapWidth: 960
    pos: [0, -180]
  response_prompt_text:
    type: text
    font: SimHei
    text: |-
      请选择这段时间更接近哪个标准
    color: white
    height: 28
    wrapWidth: 980
    pos: [0, 190]
  choice_short_box:
    type: rect
    width: 220
    height: 120
    fillColor: [0.15, 0.15, 0.15]
    lineColor: [0.75, 0.75, 0.75]
    pos: [-260, -20]
  choice_long_box:
    type: rect
    width: 220
    height: 120
    fillColor: [0.15, 0.15, 0.15]
    lineColor: [0.75, 0.75, 0.75]
    pos: [260, -20]
  choice_short_label:
    type: text
    font: SimHei
    text: 短
    color: white
    height: 34
    pos: [-260, -20]
  choice_long_label:
    type: text
    font: SimHei
    text: 长
    color: white
    height: 34
    pos: [260, -20]
  choice_short_hint:
    type: text
    font: SimHei
    text: 左箭头
    color: [0.8, 0.8, 0.8]
    height: 24
    pos: [-260, -150]
  choice_long_hint:
    type: text
    font: SimHei
    text: 右箭头
    color: [0.8, 0.8, 0.8]
    height: 24
    pos: [260, -150]
  fixation:
    type: text
    font: SimHei
    text: +
    color: white
    height: 48
    pos: [0, 0]
  stimulus_flash:
    type: rect
    width: 120
    height: 120
    fillColor: white
    lineColor: white
    pos: [0, 0]
  good_bye_text:
    type: text
    font: SimHei
    text: |-
      任务结束

      总试次：{trial_count}
      学习试次：{learning_trials}
      测试试次：{test_trials}
      平均反应时：{mean_rt_s:.2f} 秒
      长反应比例：{long_choice_rate:.1%}
      漏答率：{miss_rate:.1%}

      总用时：{total_elapsed_min:.1f} 分钟

      按空格退出
    color: white
    height: 28
    wrapWidth: 980
    pos: [0, 0]

triggers:
  map:
    exp_onset: 1
    exp_end: 2
    block_onset: 10
    block_end: 11
    trial_onset: 20
    instruction_onset: 21
    learning_fixation_onset: 22
    learning_stimulus_onset: 23
    learning_label_onset: 24
    learning_iti_onset: 25
    test_fixation_onset: 26
    test_stimulus_onset: 27
    test_response_onset: 28
    test_response_short: 29
    test_response_long: 30
    test_response_timeout: 31
    test_iti_onset: 32
    good_bye_onset: 40
  driver:
    type: serial_url
    url: loop://
    baudrate: 115200
    timeout: 1
    prefix: [1, 225, 1, 0]
  policy:
    strict: false
  timing:
    post_delay_s: 0.001

qa:
  output_dir: outputs/qa
  enable_scaling: true
  timing_scale: 0.2
  min_frames: 2
  strict: false
  max_wait_s: 10.0
  acceptance_criteria:
    required_columns:
      - condition
      - block_role
      - trial_kind
      - stimulus_ms
      - response_received
      - response_label
      - response_rt_s
    expected_trial_count: 16
    allowed_keys:
      - space
      - left
      - right
    triggers_required: true
