task_plot_spec:
  spec_version: '0.2'
  meta:
    task_name: Trier Social Stress Test
    mode: existing
    task_id: ''
  figure:
    output:
      filename: task_flow.png
      dpi: 300
      width_in: 16.0
      background: white
    layout:
      max_conditions: 4
      screens_per_timeline: 7
      screen_overlap_ratio: 0.1
      screen_slope: 0.08
      screen_slope_deg: 25.0
      timeline_gap: 0.18
      screen_aspect_ratio: 1.4545454545454546
      left_margin: 0.2
      right_margin: 0.03
      top_margin: 0.03
      bottom_margin: 0.05
      condition_label_gap: 0.014
      phase_label_pad: 0.01
      duration_label_gap: 0.006
      timeline_arrow_gap: 0.01
      timeline_arrow_screen_clearance: 0.007
      timeline_arrow_text_clearance: 0.01
      timeline_arrow_extra_per_screen: 0.015
      timeline_arrow_min_y: 0.02
      timeline_arrow_max_y: 0.96
  timelines:
  - condition: tsst
    display_condition_label: Tsst
    phases:
    - phase_name: instruction
      display_phase_label: Instruction
      duration_ms: null
      response_window_ms: null
      display_timing_label: ''
      stim_ids:
      - instruction_text
      stimulus_example:
        summary: 你将进行一段经典的 Trier Social Stress Test。 你会先看到安静等待…
        modality: visual
        draw_hint: text
        render_items:
        - kind: text
          text: '你将进行一段经典的 Trier Social Stress Test。

            你会先看到安静等待和准备阶段，然后面对两位保持沉默的评委与录制提示，

            进行 5 分钟的即兴陈述，随后进行 5 分钟的心算。

            请尽量连续、清晰地完成每个阶段。


            按空格开始。'
          color: white
          pos:
          - 0.0
          - 0.0
          height: 28.0
      notes: ''
    - phase_name: baseline acclimation
      display_phase_label: Baseline Acclimation
      duration_ms:
        fixed: 300
      response_window_ms: null
      display_timing_label: 300 ms
      stim_ids:
      - baseline_text
      - fixation
      stimulus_example:
        summary: 请安静坐好，注视中央十字。 + +
        modality: visual
        draw_hint: text
        render_items:
        - kind: text
          text: 请安静坐好，注视中央十字。
          color: '#f2f2f2'
          pos:
          - 0.0
          - 118.0
          height: 28.0
        - kind: text
          text: +
          color: white
          pos:
          - 0.0
          - -128.0
          height: 48.0
      notes: ''
    - phase_name: speech preparation
      display_phase_label: Speech Preparation
      duration_ms:
        fixed: 600
      response_window_ms: null
      display_timing_label: 600 ms
      stim_ids:
      - panel_backdrop
      - judge_left_body
      - judge_left_head
      - judge_right_body
      - judge_right_head
      - camera_light
      - camera_label
      - prep_text
      stimulus_example:
        summary: Rectangle Rectangle + Rectangle Rectangle + Circle + Rectangle Rectangle
          + Circle + Circle + REC + 请准备一段 10 分钟的陈述， 说明你为什么适合这份工作。 两位评委将保持沉默并记录。
        modality: visual
        draw_hint: text
        render_items:
        - kind: shape
          shape: rect
          label: Rectangle Rectangle
          color: '#8e8e8e'
          line_color: '#a5a5a5'
          line_width: 1.0
          pos:
