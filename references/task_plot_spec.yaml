task_plot_spec:
  spec_version: '0.2'
  meta:
    task_name: Temporal Bisection Task
    mode: existing
    task_id: ''
  figure:
    output:
      filename: task_flow.png
      dpi: 300
      width_in: 16.0
      background: white
    layout:
      max_conditions: 2
      screens_per_timeline: 6
      screen_overlap_ratio: 0.1
      screen_slope: 0.08
      screen_slope_deg: 25.0
      timeline_gap: 0.18
      screen_aspect_ratio: 1.4545454545454546
      left_margin: 0.2
      right_margin: 0.03
      top_margin: 0.03
      bottom_margin: 0.05
      condition_label_gap: 0.014
      phase_label_pad: 0.01
      duration_label_gap: 0.006
      timeline_arrow_gap: 0.01
      timeline_arrow_screen_clearance: 0.007
      timeline_arrow_text_clearance: 0.01
      timeline_arrow_extra_per_screen: 0.015
      timeline_arrow_min_y: 0.02
      timeline_arrow_max_y: 0.96
  timelines:
  - condition: learning
    display_condition_label: Learning
    phases:
    - phase_name: fixation phase
      display_phase_label: Fixation
      duration_ms:
        fixed: 500
      response_window_ms: null
      display_timing_label: 500 ms
      stim_ids:
      - fixation
      stimulus_example:
        summary: +
        modality: visual
        draw_hint: text
        render_items:
        - kind: text
          text: +
          color: white
          pos:
          - 0.0
          - 0.0
          height: 48.0
      notes: ''
    - phase_name: stimulus phase
      display_phase_label: Stimulus
      duration_ms:
        range:
        - 1
        - 1000
      response_window_ms: null
      display_timing_label: 1-1000 ms
      stim_ids:
      - stimulus_flash
      stimulus_example:
        summary: Rectangle Rectangle
        modality: visual
        draw_hint: shape
        render_items:
        - kind: shape
          shape: rect
          label: Rectangle Rectangle
          color: white
          line_color: white
          line_width: 1.0
          pos:
          - 0.0
          - 0.0
          size: null
      notes: ''
    - phase_name: learning label phase
      display_phase_label: Learning Label
      duration_ms:
        fixed: 600
      response_window_ms: null
      display_timing_label: 600 ms
      stim_ids:
      - learning_label_text
      stimulus_example:
        summary: 这是… …
        modality: visual
        draw_hint: text
        render_items:
        - kind: text
          text: '这是…

            …'
          color: white
          pos:
          - 0.0
          - -180.0
          height: 30.0
      notes: ''
    - phase_name: iti phase
      display_phase_label: ITI
      duration_ms:
        fixed: 400
      response_window_ms: null
      display_timing_label: 400 ms
      stim_ids:
      - fixation
      stimulus_example:
        summary: +
        modality: visual
        draw_hint: text
        render_items:
        - kind: text
          text: +
          color: white
          pos:
          - 0.0
          - 0.0
          height: 48.0
      notes: ''
    - phase_name: response phase
      display_phase_label: Response Phase
      duration_ms:
        fixed: 3000
      response_window_ms:
        fixed: 3000
      display_timing_label: 3000 ms
      stim_ids:
      - response_prompt_text
      - choice_short_box
      - choice_long_box
      - choice_short_label
      - choice_long_label
      - choice_short_hint
      - choice_long_hint
      stimulus_example:
        summary: 请选择这段时间更接近哪个标准 + Rectangle Rectangle + Rectangle Rectangle + 短 +
          长 + 左箭头 + 右箭头
        modality: visual
        draw_hint: shape
        render_items:
        - kind: text
          text: 请选择这段时间更接近哪个标准
          color: white
          pos:
          - 0.0
          - 190.0
          height: 28.0
        - kind: shape
          shape: rect
          label: Rectangle Rectangle
          color: '#929292'
          line_color: '#dfdfdf'
          line_width: 1.0
          pos:
          - -260.0
          - -20.0
          size: null
        - kind: shape
          shape: rect
          label: Rectangle Rectangle
          color: '#929292'
          line_color: '#dfdfdf'
          line_width: 1.0
          pos:
          - 260.0
          - -20.0
          size: null
        - kind: text
          text: 短
          color: white
          pos:
          - -260.0
          - -20.0
          height: 34.0
        - kind: text
          text: 长
          color: white
          pos:
          - 260.0
          - -20.0
          height: 34.0
        - kind: text
          text: 左箭头
          color: '#e5e5e5'
          pos:
          - -260.0
          - -150.0
          height: 24.0
        - kind: text
          text: 右箭头
          color: '#e5e5e5'
          pos:
          - 260.0
          - -150.0
          height: 24.0
      notes: ''
    - phase_name: iti phase
      display_phase_label: ITI
      duration_ms:
        fixed: 400
      response_window_ms: null
      display_timing_label: 400 ms
      stim_ids:
      - fixation
      stimulus_example:
        summary: +
        modality: visual
        draw_hint: text
        render_items:
        - kind: text
          text: +
          color: white
          pos:
          - 0.0
          - 0.0
          height: 48.0
      notes: ''
    condition_variants:
    - test
    display_condition_note: 'Also: Test'
  legend: []
